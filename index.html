<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Distribuidora XYZ · BI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <script>
    (function(){
      try {
        var t = localStorage.getItem('bi.theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch(e) {}
    })();
  </script>
  <!-- React PRODUCTION (minificado, ~10x mais rapido que development build) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
</head>
<body>
  <div id="root"></div>

  <script>
    // Le filtro persistido ANTES do data.js, pq data.js usa window.BIT_FILTER pra montar BIT inicial.
    try { window.BIT_FILTER = localStorage.getItem('bi.statusFilter') || 'realizado'; }
    catch (e) { window.BIT_FILTER = 'realizado'; }
    // URL da API de geracao on-demand de relatorio IA. Usado pelo PageRelatorio
    // como fallback quando o report-{year}-{month}.json estatico nao existe.
    window.BI_REPORT_API = "https://<api-url-do-bi-config-via-coolify>";
  </script>
  <!-- XYZ: dados pre-calculados pelos scripts/build_*_data.py -->
  <script src="astro-data.js"></script>
  <script src="dashfatur-data.js"></script>
  <script src="giro-data.js"></script>
  <script src="frete-data.js"></script>
  <script src="pedmin-data.js"></script>
  <script src="recompra-data.js"></script>
  <script src="campanhas-data.js"></script>
  <script src="agressividade-data.js"></script>
  <script src="abc-data.js"></script>
  <script src="tendcomp-data.js"></script>
  <script src="tendtemp-data.js"></script>
  <script src="tendprod-data.js"></script>
  <script src="tendmarcas-data.js"></script>
  <script src="cohort-data.js"></script>
  <script src="compvendatotal-data.js"></script>
  <script src="analisevendas-data.js"></script>
  <script src="campest-data.js"></script>
  <script src="vendasdiautil-data.js"></script>
  <script src="cfv-data.js"></script>
  <script src="geral-data.js"></script>
  <!-- data.js + data-extras.js do template (fin40/Omie/etc) — opcionais, BIT vazio se nao gerados -->
  <script>window.BIT = window.BIT || {}; window.BIT_META = window.BIT_META || { empresa: { nome_fantasia: 'Distribuidora XYZ', cidade: 'Brasil · BGP GO' } }; window.BIT.fmt = window.BIT.fmt || ((v) => (v||0).toLocaleString('pt-BR', {style:'currency',currency:'BRL'})); window.BIT.fmtK = window.BIT.fmtK || ((v) => { const a=Math.abs(v||0); if(a>=1e6) return 'R$ '+(a/1e6).toFixed(1)+'M'; if(a>=1e3) return 'R$ '+(a/1e3).toFixed(0)+'k'; return 'R$ '+a.toFixed(0); });</script>
  <!-- DuckDB-WASM via ESM CDN (pra Dash V3 com filtros reativos sobre parquet) -->
  <script type="module">
    (async () => {
      try {
        const duckdb = await import('https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.29.0/+esm');
        const JSDELIVR = duckdb.getJsDelivrBundles();
        const bundle = await duckdb.selectBundle(JSDELIVR);
        const worker_url = URL.createObjectURL(
          new Blob([`importScripts("${bundle.mainWorker}");`], { type: 'text/javascript' })
        );
        const worker = new Worker(worker_url);
        const logger = new duckdb.ConsoleLogger(duckdb.LogLevel.WARNING);
        const db = new duckdb.AsyncDuckDB(logger, worker);
        await db.instantiate(bundle.mainModule, bundle.pthreadWorker);
        URL.revokeObjectURL(worker_url);
        // Carrega parquet
        const resp = await fetch('data/vendas_dash.parquet');
        if (!resp.ok) throw new Error('parquet ' + resp.status);
        const buf = new Uint8Array(await resp.arrayBuffer());
        await db.registerFileBuffer('vendas.parquet', buf);
        const conn = await db.connect();
        await conn.query("CREATE OR REPLACE VIEW vendas AS SELECT * FROM read_parquet('vendas.parquet')");
        await conn.close();
        window.__duckdb = db;
        window.__duckdbReady = true;
        // notifica componentes
        document.dispatchEvent(new CustomEvent('duckdb-ready'));
        console.log('DuckDB ready');
      } catch (e) {
        console.error('DuckDB init err:', e);
        window.__duckdbErr = String(e);
        document.dispatchEvent(new CustomEvent('duckdb-error', { detail: String(e) }));
      }
    })();
  </script>
  <!-- JSX pre-compilado pelo build-jsx.cjs -->
  <script src="app.bundle.js"></script>
</body>
</html>
